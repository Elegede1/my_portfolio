{% extends 'base.html' %}

{% block content %}
    <section class="py-5">
        <div class="container px-5 mb-5">
            <div class="text-center mb-5">
                <h1 class="display-5 fw-bolder mb-0"><span class="text-gradient d-inline">Edit Projects</span></h1>
            </div>
        </div>
    </section>
{% from 'bootstrap/form.html' import render_form %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <!-- World-Class Enhancement: Display the current project image -->
            {% if current_img_url %}
                <div class="mb-4 text-center">
                    <p class="text-muted">Current Image:</p>
                    <img src="{{ url_for('static', filename=current_img_url) }}" class="img-fluid rounded shadow-sm" style="max-height: 250px;" alt="Current project image">
                </div>
            {% endif %}

            <!-- Pass novalidate and button_map for consistency -->
            {{ render_form(form, novalidate=True, button_map={'submit': 'primary'})|safe }}
        </div>
    </div>
</div>

{% endblock %}
