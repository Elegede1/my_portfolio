{% extends 'admin/base.html' %}

{% block head_tail %}
    {{ super() }}
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <style>
        /* Admin specific dark mode toggle button styling */
        #adminDarkModeToggle {
            margin-top: 10px;
            margin-right: 15px;
            cursor: pointer;
        }
    </style>
{% endblock %}



{% block tail %}
    {{ super() }}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const body = document.body;
            
            // 1. Create the toggle button element
            const toggleLi = document.createElement('li');
            toggleLi.className = 'nav-item';
            toggleLi.innerHTML = `
                <a class="nav-link" id="adminDarkModeToggle" title="Toggle Dark Mode" style="cursor: pointer; display: flex; align-items: center; justify-content: center;">
                    <i class="fa fa-moon-o"></i>
                </a>
            `;
            
            // 2. Find the navbar and inject it
            // Flask-Admin Bootstrap 4 uses .navbar-nav. We'll append it to the last one (usually right-aligned items)
            const navbars = document.querySelectorAll('.navbar-nav');
            if (navbars.length > 0) {
                // Append to the last .navbar-nav found (often the right side one)
                navbars[navbars.length - 1].appendChild(toggleLi);
            }

            const toggle = document.getElementById('adminDarkModeToggle');
            
            // Check saved preference
            if (localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
                if (toggle) toggle.innerHTML = '<i class="fa fa-sun-o"></i>';
            }

            if (toggle) {
                toggle.addEventListener('click', function() {
                    body.classList.toggle('dark-mode');
                    
                    if (body.classList.contains('dark-mode')) {
                        localStorage.setItem('darkMode', 'enabled');
                        toggle.innerHTML = '<i class="fa fa-sun-o"></i>';
                    } else {
                        localStorage.setItem('darkMode', 'disabled');
                        toggle.innerHTML = '<i class="fa fa-moon-o"></i>';
                    }
                });
            }
        });
    </script>
{% endblock %}
