{% extends 'admin/base.html' %}

{% block head_tail %}
    {{ super() }}
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
    <style>
        /* Admin specific dark mode toggle button styling */
        #adminDarkModeToggle {
            margin-top: 10px;
            margin-right: 15px;
            cursor: pointer;
        }
    </style>
{% endblock %}

{% block menu_links %}
    <li class="nav-item">
        <a class="nav-link" id="adminDarkModeToggle" title="Toggle Dark Mode" style="cursor: pointer;">
            <i class="fa fa-moon-o"></i>
        </a>
    </li>
    {{ super() }}
{% endblock %}

{% block tail %}
    {{ super() }}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('adminDarkModeToggle');
            const body = document.body;
            
            // Check saved preference
            if (localStorage.getItem('darkMode') === 'enabled') {
                body.classList.add('dark-mode');
                toggle.innerHTML = '<i class="fa fa-sun-o"></i>';
            }

            toggle.addEventListener('click', function() {
                body.classList.toggle('dark-mode');
                
                if (body.classList.contains('dark-mode')) {
                    localStorage.setItem('darkMode', 'enabled');
                    toggle.innerHTML = '<i class="fa fa-sun-o"></i>';
                } else {
                    localStorage.setItem('darkMode', 'disabled'); // Keep consistent with disabled state
                    toggle.innerHTML = '<i class="fa fa-moon-o"></i>';
                }
            });
        });
    </script>
{% endblock %}
